clude the following header:\n\n        ```http\n        X-API-Key: {{api_key}}\n        ```\n\n        ## Base URL\n\n        All endpoints are relative to:\n\n        ```text\n        {{base_url}}/{{api_version}}\n        ```\n\n        ## Request Format\n\n        * All requests must be made over **HTTPS**.\n        * Request and response payloads use **JSON**.\n        * Include the `Content-Type: application/json` header for requests with a body.\n\n        ## Response Format\n\n        Successful requests return an appropriate HTTP status code and a JSON response.\n\n        Example:\n\n        ```json\n        {\n            \"success\": true,\n            \"message\": \"Request completed successfully.\",\n            \"data\": [\n                ...\n            ]\n        }\n        ```\n\n        ## Error Handling\n\n        Common response codes include:\n\n        | Status Code | Description           |\n        | ----------- | --------------------- |\n        | `200`       | Success               |\n        | `201`       | Resource created      |\n        | `400`       | Bad Request           |\n        | `401`       | Unauthorized          |\n        | `403`       | Forbidden             |\n        | `404`       | Patient not found     |\n        | `422`       | Validation failed     |\n        | `500`       | Internal Server Error |\n\n        ## Notes\n\n        * Each endpoint documents its required request parameters and response schema.\n        * Unless otherwise specified, all date and time values use the ISO 8601 format.\n        * Field validation rules and business constraints are documented with each endpoint.\n        * Clients should securely store their API key and include it with every request.\n      type: text/markdown\n    items:\n      - info:\n          name: Add Patient\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{URL}}/{{api_version}}/patients'\n          headers:\n            - t associated with the provided API key.\n\n          | Method | Endpoint | Description                                               |\n          | ------ | -------- | --------------------------------------------------------- |\n          | `GET`  | `/units` | Retrieve all units available to the authenticated client. |\n\n          ---\n\n          ## Pre-Requisites\n\n          Before calling the **`GET /units`** endpoint, ensure the following:\n\n          * A valid **`X-API-Key`** is included in the request headers.\n          * Each `X-API-Key` is associated with a single client.\n          * The response includes only the units that belong to the authenticated client.\n\n          ---\n\n          ## Request Headers\n\n          | Header      | Required | Description                        |\n          | ----------- | -------- | ---------------------------------- |\n          | `X-API-Key` | Yes      | API key issued during onboarding.  |\n          | `Accept`    | Yes      | Must be set to `application/json`. |\n\n          ### Example Request\n\n          ```http id=\"tw9vfj\"\n          GET {{base_url}}/{{api_version}}/units\n\n          X-API-Key: {{api_key}}\n          Accept: application/json\n          ```\n\n          ---\n\n          ## Response Format\n\n          A successful request returns an HTTP **`200 OK`** response.\n\n          ### Example Response\n\n          ```json id=\"0mg7bx\"\n          {\n              \"success\": true,\n              \"message\": \"Units retrieved successfully.\",\n              \"data\": [\n                  {\n                      \"unit_id\": \"01JZ1GHM9Q3W7D8K2YF5N4R6TX\",\n                      \"unit_name\": \"Adult Behavioral Health\"\n                  },\n                  {\n                      \"unit_id\": \"01JZ1GJ2CZ3QNR0ZBTR3V8Q4MH\",\n                      \"unit_name\": \"Chemical Dependency\"\n                  }\n              ]\n          }\n          ```\n\n          ---\n\n          ## Response Fields\n\n          | Field       | Type            | Description                    |\n          | ----------- | --------------- | ------------------------------ |\n          | `unit_id`   | `string (ULID)` | Unique identifier of the unit. |\n          | `unit_name` | `string`        | Name of the unit.              |\n\n          ---\n\n          ## HTTP Status Codes\n\n          | Status Code | Description                                                                       |\n          | ----------- | --------------------------------------------------------------------------------- |\n          | `200`       | Units retrieved successfully.                                                     |\n          | `401`       | Unauthorized. The API key is missing or invalid.                                  |\n          | `403`       | Forbidden. The API key does not have permission to access the requested resource. |\n          | `500`       | Internal Server Error. An unexpected error occurred while processing the request. |\n\n          ---\n\n          ## Notes\n\n          * This endpoint returns **only** the units associated with the authenticated client.\n          * The `unit_id` is a **ULID** and should be used in subsequent API requests that require a unit identifier.\n          * Store the returned `unit_id` values securely and use them exactly as returned.\n          * The `unit_name` is intended for display purposes only and should not be used as a unique identifier.\n        examples:\n          - name: Get units\n            request:\n              url: '{{URL}}{{api_version}}/units'\n              method: GET\n              headers:\n                - name: X-api-key\n                  value: '{{X-api-key}}'\n            response:\n              status: 200\n              statusText: OK\n              headers:\n                - name: host\n                  value: 127.0.0.1:8000\n                - name: connection\n                  value: close\n                - name: x-powered-by\n                  value: PHP/8.4.21\n                - name: cache-control\n                  value: no-cache, private\n                - name: date\n                  value: Thu, 02 Jul 2026 12:32:47 GMT\n                - name: content-type\n                  value: application/json\n                - name: vary\n                  value: Origin\n              body:\n                type: json\n                data: |-\n                  {\n                    \"success\": true,\n                    \"message\": \"The client units retrieved successfully\",\n                    \"data\": [\n                      {\n                        \"unit_id\": \"01KRX92E0JA10JQ3TC7GY4903A\",\n                        \"unit_name\": \"Unit 1\"\n                      },\n                      {\n                        \"unit_id\": \"01KRX92E2QXKJ803RJRKYBVCA1\",\n                        \"unit_name\": \"Unit 2\"\n                      },\n                      {\n                        \"unit_id\": \"01KRX92E4KC576V8TTYHPNDR4J\",\n                        \"unit_name\": \"Unit 3\"\n                      },\n                      {\n                        \"unit_id\": \"01KRX92E6E0DEKXXCAWJ4DTTNC\",\n                        \"unit_name\": \"Unit 4\"\n                      },\n                      {\n                        \"unit_id\": \"01KRX92E8D64MWVPAMHZXEB591\",\n                        \"unit_name\": \"Unit 5\"\n                      }\n                    ]\n                  }\nrequest:\n  headers:\n    - name: X-api-key\n      value: '{{X-api-key}}'\ndocs:\n  content: |\n    <p align=\"center\">\n      <img src=\"https://cdn.prod.website-files.com/669e92eba691ad0ec575cf37/6a3d260ba69a7da97f550f60_engage-logo.png\" alt=\"Engage Logo\" width=\"300\">\n    <\/p>\n\n    # Welcome to the Engage API Documentation\n\n    | Property | Value |\n    |----------|-------|\n    | **API Version** | `v2` |\n    | **Environment** | Sandbox |\n    | **Documentation Version** | `1.3.0` |\n    | **Last Updated** | **July 15, 2026** |\n\n    Welcome to the API documentation. This guide provides everything you need to integrate with our REST APIs securely and efficiently.\n\n    Our APIs enable authorized applications to exchange data with our platform using standard HTTPS requests and JSON payloads. This documentation includes authentication requirements, request and response formats, endpoint specifications, error handling, and integration best practices.\n\n    ---\n\n    # Environment Variables\n\n    The following variables are used throughout this documentation to simplify configuration across environments.\n\n    | Variable          | Description                           | Example                              |\n    | ----------------- | ------------------------------------- | ------------------------------------ |\n    | `{{base_url}}`    | Base URL for the selected environment | `https://staging-api.engagebyclarity.com` |\n    | `{{api_version}}` | Current API version                   | `v2`                                 |\n    | `{{api_key}}`     | API Key issued during onboarding      | `YOUR_API_KEY`                       |\n\n    ## Environment Configuration\n\n    ### Sandbox\n\n    | Variable      | Value                                |\n    | ------------- | ------------------------------------ |\n    | `base_url`    | `https://staging-api.engagebyclarity.com` |\n    | `api_version` | `v2`                                 |\n\n    ### Production\n\n    | Variable      | Value                        |\n    | ------------- | ---------------------------- |\n    | `base_url`    | `https://api.engagebyclarity.com` |\n    | `api_version` | `v2`                         |\n\n    ---\n\n    # Base URL\n\n    All API endpoints are relative to the following URL:\n\n    ```text\n    {{base_url}}/{{api_version}}\n    ```\n\n    For example, if the endpoint is:\n\n    ```http\n    GET /patients\n    ```\n\n    The complete request URL becomes:\n\n    **Sandbox**\n\n    ```text\n    https://staging-api.engagebyclarity.com/v2/patients\n    ```\n\n    **Production**\n\n    ```text\n    https://api.engagebyclarity.com/v2/patients\n    ```\n\n    Using variables, the same request can be represented as:\n\n    ```text\n    {{base_url}}/{{api_version}}/patients\n    ```\n\n    > **Note**\n    >\n    > * All API requests must be made over **HTTPS**.\n    > * Requests made over **HTTP** are not supported.\n    > * Future API versions may be introduced by updating the `{{api_version}}` variable.\n\n    ---\n\n    # Authentication\n\n    All API requests must be authenticated using an API Key issued during onboarding.\n\n    Each client is assigned a unique API key that must be included in the request headers for **every API request**.\n\n    Requests that do not include a valid API key will be rejected with an HTTP **401 Unauthorized** response.\n\n    ## Required Headers\n\n    ```http\n    X-API-Key: {{api_key}}\n    Content-Type: application/json\n    Accept: application/json\n    ```\n\n    ### Example Request\n\n    ```http\n    GET {{base_url}}/{{api_version}}/patients\n\n    X-API-Key: {{api_key}}\n    Content-Type: application/json\n    Accept: application/json\n    ```\n\n    > **Security Recommendations**\n    >\n    > * Keep your API key confidential.\n    > * Never expose API keys in public repositories or client-side applications.\n    > * Store API keys securely using environment variables or a secrets management solution.\n    > * Contact support immediately if your API key is suspected to be compromised.\n\n    ---\n\n    # Request Format\n\n    Our APIs follow RESTful conventions.\n\n    ### Supported HTTP Methods\n\n    * GET\n    * POST\n    * PUT\n    * PATCH\n\n    ### Content Type\n\n    Unless otherwise specified, all request payloads must be submitted as JSON.\n\n    ```http\n    Content-Type: application/json\n    Accept: application/json\n    ```\n\n    ---\n\n    # Response Format\n\n    All responses are returned in JSON format.\n\n    ## Successful Response\n\n    ```json\n    {\n        \"success\": true,\n        \"message\": \"Request completed successfully.\",\n        \"data\": [\n            ...\n        ]\n    }\n    ```\n\n    ## Error Response\n\n    ```json\n    {\n        \"success\": false,\n        \"message\": \"Invalid API Key.\"\n    }\n    ```\n\n    ## Validation Error\n\n    ```json\n    {\n        \"success\": false,\n        \"message\": \"Validation failed.\",\n        \"errors\": {\n            \"field_name\": [\n                \"Validation message.\"\n            ]\n        }\n    }\n    ```\n\n    ---\n\n    # HTTP Status Codes\n\n    | Status Code | Description                                    |\n    | ----------- | ---------------------------------------------- |\n    | **200**     | Request completed successfully                 |\n    | **201**     | Resource created successfully                  |\n    | **204**     | Request completed successfully with no content |\n    | **400**     | Bad Request                                    |\n    | **401**     | Unauthorized (Missing or Invalid API Key)      |\n    | **403**     | Forbidden                                      |\n    | **404**     | Resource not found                             |\n    | **409**     | Conflict                                       |\n    | **422**     | Validation failed                              |\n    | **429**     | Too Many Requests                              |\n    | **500**     | Internal Server Error                          |\n\n    ---\n\n    # Best Practices\n\n    To ensure a secure and reliable integration:\n\n    * Always use HTTPS.\n    * Include the `X-API-Key` header in every request.\n    * Validate request payloads before submitting them.\n    * Handle all HTTP status codes appropriately.\n    * Never hardcode API credentials in source code.\n    * Store API credentials securely.\n    * Implement appropriate timeout and retry mechanisms.\n    * Keep your integration updated with the latest API version.\n\n    ---\n\n    # Versioning\n\n    The API is versioned using the URL path.\n\n    ```text\n    {{base_url}}/{{api_version}}\n    ```\n\n    Future API versions may introduce additional functionality while maintaining backward compatibility whenever possible.\n\n    When a new version becomes available, simply update the `{{api_version}}` variable used in your requests.\n\n    ---\n\n    # Support\n\n    If you encounter any issues while integrating with our APIs, please contact our support team.\n\n    When raising a support request, include the following information whenever possible:\n\n    * Endpoint URL\n    * HTTP Method\n    * Request Timestamp\n    * HTTP Status Code\n    * Request Body (excluding sensitive information)\n    * Response Body\n    * Error Message\n    * Correlation ID or Request ID (if available)\n\n    Providing these details will help us investigate and resolve your issue more efficiently.\n\n    ---\n\n    # Documentation Structure\n\n    Each endpoint in this collection includes:\n\n    * Endpoint Description\n    * HTTP Method\n    * Endpoint URL\n    * Authentication Requirements\n    * Request Headers\n    * Path Parameters\n    * Query Parameters\n    * Request Body\n    * Sample Request\n    * Success Response\n    * Error Responses\n    * HTTP Status Codes\n    * Business Rules (where applicable)\n\n    ---\n\n    # Getting Started\n\n    Before making your first API request, ensure you have:\n\n    * Access to the appropriate environment (Sandbox or Production).\n    * A valid API Key.\n    * An HTTP client such as Postman, Insomnia, cURL, or your preferred programming language.\n    * Network access to the API endpoint.\n\n    Once configured, you're ready to begin integrating with the available API endpoints documented in this collection.\n\n    ---\n\n    # Changelog\n\n    Changes to the API will be communicated through version updates and release notes.\n\n    We recommend reviewing the documentation periodically to stay informed about new features, enhancements, and deprecations.\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-07-15T14:37:58.250Z'\n    exportedUsing: Bruno/3.5.2\n";
